spring.application.name=phising-detector
server.port=8081
# Credenciales de desarrollo para Spring Security
spring.security.user.name=admin
spring.security.user.password=${API_ADMIN_PASSWORD:portfolio2026}

# Configuración H2
spring.datasource.url=jdbc:h2:mem:phishingdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true

# Configuración de IA (Lee de las variables de entorno)
ai.api.base-url=${AI_API_BASE_URL:https://api.groq.com/openai/v1}
ai.api.key=${AI_API_KEY}



























